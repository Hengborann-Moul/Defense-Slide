<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thesis Defense — Slide Navigator</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a1530;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    background: #0F1F3D;
    border-bottom: 1px solid rgba(20,184,166,0.3);
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .topbar .title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .topbar .title .accent { color: #14B8A6; }
  .topbar .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .btn {
    background: rgba(20,184,166,0.15);
    color: #14B8A6;
    border: 1px solid rgba(20,184,166,0.4);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: rgba(20,184,166,0.25); }
  .btn .material-icons { font-size: 16px; }
  .counter {
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    padding: 0 12px;
  }
  .counter .current { color: #14B8A6; font-weight: 700; }

  .stage {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #1a2540;
    padding: 24px;
    overflow: auto;
    position: relative;
  }
  .frame-wrap {
    width: 1280px;
    height: 720px;
    flex-shrink: 0;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(20,184,166,0.2);
    border-radius: 4px;
    overflow: hidden;
    background: #fff;
    position: relative;
  }
  iframe#frame {
    width: 1280px;
    height: 720px;
    border: 0;
    display: block;
  }
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(15,31,61,0.8);
    color: #14B8A6;
    border: 1px solid rgba(20,184,166,0.4);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    z-index: 10;
    transition: background 0.15s;
  }
  .nav-arrow:hover { background: rgba(20,184,166,0.3); }
  .nav-arrow.prev { left: 24px; }
  .nav-arrow.next { right: 24px; }
  .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }

  .thumbstrip {
    background: #0F1F3D;
    border-top: 1px solid rgba(20,184,166,0.2);
    padding: 12px 24px;
    flex-shrink: 0;
    max-height: 180px;
    overflow-x: auto;
    overflow-y: hidden;
  }
  .thumbstrip-inner {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .thumb {
    flex-shrink: 0;
    width: 96px;
    height: 54px;
    border: 2px solid transparent;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    background: #fff;
    position: relative;
    transition: border-color 0.15s, transform 0.15s;
  }
  .thumb:hover { transform: translateY(-2px); border-color: rgba(20,184,166,0.5); }
  .thumb.active { border-color: #14B8A6; }
  .thumb iframe {
    width: 1280px;
    height: 720px;
    border: 0;
    transform: scale(0.075);
    transform-origin: top left;
    pointer-events: none;
  }
  .thumb .num {
    position: absolute;
    bottom: 2px;
    left: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: #0F1F3D;
    background: rgba(255,255,255,0.85);
    padding: 1px 4px;
    border-radius: 2px;
    font-weight: 700;
  }

  .helpbar {
    background: rgba(20,184,166,0.08);
    border-top: 1px solid rgba(20,184,166,0.2);
    padding: 8px 24px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .helpbar kbd {
    background: rgba(255,255,255,0.1);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #14B8A6;
    margin: 0 2px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="title"><span class="accent">●</span> Efficient Attention Classification — Thesis Defense · Slide Navigator</div>
  <div class="controls">
    <button class="btn" id="openBtn"><span class="material-icons">open_in_new</span> Open in new tab</button>
    <button class="btn" id="fullscreenBtn"><span class="material-icons">fullscreen</span> Fullscreen</button>
    <span class="counter"><span class="current" id="curNum">01</span> / <span id="totalNum">34</span></span>
  </div>
</div>

<div class="stage">
  <button class="nav-arrow prev" id="prevBtn" title="Previous (←)">‹</button>
  <div class="frame-wrap">
    <iframe id="frame" src="slide_01.html"></iframe>
  </div>
  <button class="nav-arrow next" id="nextBtn" title="Next (→)">›</button>
</div>

<div class="thumbstrip">
  <div class="thumbstrip-inner" id="thumbstrip"></div>
</div>

<div class="helpbar">
  <div>
    Navigate: <kbd>←</kbd> <kbd>→</kbd> or <kbd>Space</kbd> &nbsp;|&nbsp;
    First/Last: <kbd>Home</kbd> <kbd>End</kbd> &nbsp;|&nbsp;
    Fullscreen: <kbd>F</kbd> &nbsp;|&nbsp;
    Open current in new tab: <kbd>O</kbd>
  </div>
  <div>34 slides · 1280 × 720 · Navy + Teal</div>
</div>

<script>
  const TOTAL = 34;
  const slides = [];
  for (let i = 1; i <= TOTAL; i++) {
    slides.push({
      n: i,
      file: 'slide_' + String(i).padStart(2, '0') + '.html'
    });
  }

  let current = 1;
  const frame = document.getElementById('frame');
  const curNum = document.getElementById('curNum');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const openBtn = document.getElementById('openBtn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const thumbstrip = document.getElementById('thumbstrip');

  // Build thumbnails
  slides.forEach(s => {
    const t = document.createElement('div');
    t.className = 'thumb' + (s.n === 1 ? ' active' : '');
    t.dataset.n = s.n;
    t.innerHTML = `<iframe src="${s.file}" loading="lazy" sandbox="allow-same-origin"></iframe><div class="num">${String(s.n).padStart(2,'0')}</div>`;
    t.onclick = () => goTo(s.n);
    thumbstrip.appendChild(t);
  });

  function goTo(n) {
    if (n < 1 || n > TOTAL) return;
    current = n;
    frame.src = slides[n-1].file;
    curNum.textContent = String(n).padStart(2, '0');
    prevBtn.disabled = n === 1;
    nextBtn.disabled = n === TOTAL;
    document.querySelectorAll('.thumb').forEach(t => {
      t.classList.toggle('active', parseInt(t.dataset.n) === n);
      if (parseInt(t.dataset.n) === n) {
        t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    });
  }

  prevBtn.onclick = () => goTo(current - 1);
  nextBtn.onclick = () => goTo(current + 1);
  openBtn.onclick = () => window.open(slides[current-1].file, '_blank');
  fullscreenBtn.onclick = () => {
    const elem = document.querySelector('.stage');
    if (!document.fullscreenElement) elem.requestFullscreen();
    else document.exitFullscreen();
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); goTo(current + 1); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); goTo(current - 1); }
    else if (e.key === 'Home') { e.preventDefault(); goTo(1); }
    else if (e.key === 'End') { e.preventDefault(); goTo(TOTAL); }
    else if (e.key === 'f' || e.key === 'F') { fullscreenBtn.click(); }
    else if (e.key === 'o' || e.key === 'O') { openBtn.click(); }
  });

  goTo(1);
</script>

</body>
</html>
